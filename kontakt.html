  <meta property="og:type" content="website">

  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/kontakt.css">
</head>
<body>
  <header>
    <a href="#main" class="skip-link">Preskoči na sadržaj</a>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger" aria-label="Otvori navigaciju">☰</label>

        <li><a href="kontakt.html" class="active">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <section aria-labelledby="kontakt-naslov">
      <h1 id="kontakt-naslov">Kontakt</h1>
      <p>Imate pitanje, prijedlog ili želite raditi samnom? Ispunite formu i javit ću vsam se čim prije.</p>

      <form action="#" method="post" novalidate>
        <div class="form-group">
          <label for="ime">Ime i prezime</label>
          <input type="text" id="ime" name="ime" required>
        </div>

        <div class="form-group">
          <label for="email">E-mail adresa</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="tema">Tema slanje poruke</label>
          <input type="text" id="tema" name="tema" required>
        </div>

        <div class="form-group">
          <label for="poruka">Poruka</label>
          <textarea id="poruka" name="poruka" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="tip-upita">Tip upita</label>
          <select id="tip-upita" name="tip-upita" required>
            <option value="">Odaberite...</option>
            <option value="suradnja">Suradnja</option>
            <option value="pitanje">Pitanje</option>
            <option value="ostalo">Ostalo</option>
          </select>
        </div>

        <button type="submit">Pošalji poruku</button>
      </form>
    </section>
  </main>

  <footer>

  </footer>
</body>
